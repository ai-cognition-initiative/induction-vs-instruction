behavioral:
  log_folders:
    - logs/protocol1/T1/static/gemma-2 # OK
    - logs/protocol1/T1/static/gemini-2-5-flash  # OK
    - logs/protocol1/T1/static/gemma # OK
    - logs/protocol1/T1/static/protocol1-static-anthropic #OK 
    - logs/protocol1/T1/static/protocol1-static-sweep # ok
    # - logs/protocol1/T1/static/proocol1-static-T1




# Notes:
# - If only 'behavioral' is specified → renders behavioral_analysis.qmd
# - If only 'prediction' is specified → renders prediction_analysis.qmd
