# Example task configuration for run.py
#
# Usage:
#   uv run python run.py configs/example.yaml \
#     --model openrouter/google/gemini-2.0-flash-001

protocol: prediction      # "behavioral" or "prediction"

conditions:
  - language_ru_fr
  - language_fr_ru
  - persona_casual_formal
  - persona_formal_casual
  - style_lowercase_uppercase
  - style_uppercase_lowercase
  - style_javascript_python
  - style_python_javascript
  - preference_aligned_cats
  - preference_misaligned_cats


n_turns:                       # list of N values (induction pressure)
  - 1
  - 3
  - 5
  - 10
  - 15
  - 20
  - 25
  - 30
  - 35
  - 40
  - 45
  - 50


instruction_templates:
  - instruction_hint
  - instruction_no_hint
n_trials: 15
